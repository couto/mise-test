min_version = '2026.4.6'

[settings]
experimental = true
lockfile = true
# locked = true

# Download the pre-compiled binbaries
# ruby.compile = false

# [plugins]
# bundler = "jonathanmorley/asdf-bundler"
# cocoapods = "mise-plugins/mise-cocoapods"
# xcode = "qasim/mise-xcode"

[tools]
node = '22.13.1'
pnpm = '10.24.0'
mitmproxy = '12.2.1'
pipx = { version = '1.11.1', os = ["macos"] }

# ruby = { version = "3.3.7", os = ["linux", "macos"] }
# bundler = { version = "2.5.7", os = ["linux", "macos"] }
# cocoapods = { version = "1.14.3", os = ["linux", "macos"] }
# java = { version = "zulu-17.64.17.0", os = ["linux", "macos"] }
#
# # Fix activesupport version to resolve cocoapods compatibility
# "gem:activesupport" = { version = "7.0.8.4", os = ["linux", "macos"] }

hk = "1.41.0"
pkl = "0.31.1"
gitleaks = "8.30.1"


[hooks]
# Automatically install/update hooks when tools are installed, 
# but avoid doing  it in the CI environment
postinstall = "{% if env.CI is not defined %} hk install --mise {% endif %}"

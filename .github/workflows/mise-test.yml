name: mise-test

on:
  push:
    branches:
      - "*"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          install: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create random file and commit
        shell: bash
        run: |
          FILE="random-$(LC_ALL=C tr -dc a-z0-9 < /dev/urandom | head -c 8).txt"
          echo "$(LC_ALL=C tr -dc a-zA-Z0-9 < /dev/urandom | head -c 64)" > "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$FILE"
          git commit -m "chore: add random file $FILE"

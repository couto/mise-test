name: mise-test

on:
  push:
    branches:
      - "*"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          install: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create random file and commit
        shell: bash
        run: |
          TIMESTAMP=$(date +%s)
          FILE="timestamp-${TIMESTAMP}.txt"
          echo "$TIMESTAMP" > "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$FILE"
          git commit -m "chore: add timestamp file $FILE"
